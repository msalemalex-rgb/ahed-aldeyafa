<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم - عهد الضيافة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--maroon:#6e1423;--maroon-dark:#4d0d18;--gold:#c8962f;--gold-light:#e6c061;--cream:#fdf6ea;--ink:#2a1a13;--muted:#8a7565;--line:#e8d9bf;--green:#1faa54}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:var(--cream);color:var(--ink)}
h1,h2,h3{font-family:'Cairo',sans-serif}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--maroon-dark),var(--maroon))}
.login-box{background:#fff;padding:40px;border-radius:14px;width:340px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;border-top:5px solid var(--gold)}
.login-box .logo{width:64px;height:64px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#a8242b,var(--maroon-dark));display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:32px;margin:0 auto 14px;border:2px solid var(--gold)}
.login-box h2{color:var(--maroon);margin-bottom:6px}
.login-box p{color:var(--muted);font-size:14px;margin-bottom:20px}
input{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:8px;font-family:'Tajawal';font-size:16px;margin-bottom:14px}
input:focus{outline:none;border-color:var(--gold)}
.btn{background:var(--maroon);color:var(--gold-light);border:none;padding:13px 24px;border-radius:8px;font-family:'Cairo';font-weight:700;font-size:16px;cursor:pointer;width:100%;transition:.2s}
.btn:hover{background:var(--maroon-dark)}
.err{color:#c0392b;font-size:14px;margin-bottom:10px;min-height:18px}
header{background:var(--maroon);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
header h1{font-size:20px;color:var(--gold-light);display:flex;align-items:center;gap:10px}
header .right{display:flex;align-items:center;gap:14px;font-size:14px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.5s infinite}
@keyframes pulse{50%{opacity:.4}}
.wrap{max-width:1000px;margin:0 auto;padding:18px}
.tabs{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.tab{background:#fff;border:1.5px solid var(--line);padding:9px 18px;border-radius:50px;cursor:pointer;font-family:'Cairo';font-weight:700;font-size:14px}
.tab.active{background:var(--maroon);color:var(--gold-light);border-color:var(--maroon)}
.tab .badge{background:var(--gold);color:var(--maroon-dark);border-radius:50px;padding:1px 8px;font-size:12px;margin-right:5px}
.order{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 6px 18px rgba(78,13,24,.08);border-right:5px solid var(--gold)}
.order.new{border-right-color:var(--green);background:#f6fff9}
.order .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.order .oid{font-family:'Cairo';font-weight:700;color:var(--maroon)}
.order .time{font-size:12px;color:var(--muted)}
.order .chan{font-size:12px;padding:3px 10px;border-radius:50px;font-family:'Cairo';font-weight:700}
.chan.knet{background:rgba(200,150,47,.18);color:#9a6b00}
.chan.whatsapp{background:rgba(31,170,84,.15);color:#178c44}
.order .items{font-size:14px;color:var(--ink);margin:6px 0;line-height:1.8}
.order .total{font-family:'Cairo';font-weight:900;color:var(--maroon);font-size:18px}
.order .meta{font-size:13px;color:var(--muted);margin-top:4px}
.order .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.sbtn{border:none;padding:7px 14px;border-radius:7px;font-family:'Cairo';font-weight:700;font-size:13px;cursor:pointer}
.sbtn.prep{background:#fff3d6;color:#9a6b00}
.sbtn.done{background:rgba(31,170,84,.15);color:#178c44}
.status-tag{font-size:12px;font-family:'Cairo';font-weight:700;padding:2px 10px;border-radius:50px}
.st-new{background:#e8fff1;color:#178c44}.st-preparing{background:#fff3d6;color:#9a6b00}.st-done{background:#eee;color:#666}
.empty{text-align:center;color:var(--muted);padding:60px 20px}
.empty .big{font-size:60px}
.soundbar{background:#fff3d6;color:#9a6b00;padding:8px;text-align:center;font-size:13px;font-family:'Cairo';font-weight:700;display:none}
</style>
</head>
<body>

<div class="login" id="loginScreen">
  <form class="login-box" onsubmit="return doLogin(event)">
    <div class="logo">🍽️</div>
    <h2>لوحة تحكم عهد الضيافة</h2>
    <p>أدخل كلمة السر للدخول</p>
    <div class="err" id="loginErr"></div>
    <input type="password" id="pass" placeholder="كلمة السر" autocomplete="current-password">
    <button class="btn" type="submit">دخول</button>
  </form>
</div>

<div id="app" style="display:none">
  <div class="soundbar" id="soundbar">🔇 اضغط في أي مكان لتفعيل صوت التنبيه</div>
  <header>
    <h1>🍽️ لوحة الطلبات</h1>
    <div class="right"><span class="dot"></span> مباشر <button class="sbtn done" onclick="logout()">خروج</button></div>
  </header>
  <div class="wrap">
    <div class="tabs">
      <div class="tab active" data-f="new" onclick="setFilter('new',this)">الجديدة <span class="badge" id="cntNew">0</span></div>
      <div class="tab" data-f="preparing" onclick="setFilter('preparing',this)">قيد التحضير</div>
      <div class="tab" data-f="all" onclick="setFilter('all',this)">الكل</div>
      <div class="tab" onclick="loadNow()">🔄 تحديث</div>
    </div>
    <div id="orders"></div>
  </div>
</div>

<script>
let KEY="", filter="new", orders=[], seen=new Set(), audioCtx=null, first=true;

function doLogin(e){
  e.preventDefault();
  const p=document.getElementById('pass').value.trim();
  if(!p){return false;}
  KEY=p;
  fetch('/api/orders?key='+encodeURIComponent(KEY)).then(r=>{
    if(r.status===401){document.getElementById('loginErr').textContent="كلمة السر غير صحيحة";return;}
    if(!r.ok){document.getElementById('loginErr').textContent="خطأ في الاتصال";return;}
    try{sessionStorage.setItem('ak',KEY);}catch(_){}
    enableSound();
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    loadNow(); setInterval(loadNow,5000);
  }).catch(()=>{document.getElementById('loginErr').textContent="خطأ في الاتصال";});
  return false;
}
function logout(){try{sessionStorage.removeItem('ak');}catch(_){}; location.reload();}

function enableSound(){
  try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(_){}
  document.getElementById('soundbar').style.display='none';
}
function beep(){
  if(!audioCtx){return;}
  try{
    for(let k=0;k<2;k++){
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type="sine"; o.frequency.value=880;
      const t=audioCtx.currentTime + k*0.3;
      g.gain.setValueAtTime(0.001,t); g.gain.exponentialRampToValueAtTime(0.4,t+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      o.start(t); o.stop(t+0.26);
    }
  }catch(_){}
}

function loadNow(){
  if(!KEY)return;
  fetch('/api/orders?key='+encodeURIComponent(KEY)).then(r=>r.json()).then(d=>{
    if(!d.orders)return;
    let fresh=0;
    d.orders.forEach(o=>{ if(!seen.has(o.id)){ seen.add(o.id); if(!first && o.status==="new") fresh++; } });
    if(fresh>0){ beep(); if(navigator.vibrate)navigator.vibrate([200,100,200]); document.title="("+fresh+") طلب جديد!"; }
    first=false; orders=d.orders; render();
  }).catch(()=>{});
}
function setFilter(f,el){filter=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));if(el)el.classList.add('active');render();}

function render(){
  const box=document.getElementById('orders');
  document.getElementById('cntNew').textContent=orders.filter(o=>o.status==="new").length;
  let list=orders;
  if(filter==="new")list=orders.filter(o=>o.status==="new");
  else if(filter==="preparing")list=orders.filter(o=>o.status==="preparing");
  if(!list.length){box.innerHTML='<div class="empty"><div class="big">📭</div><p>لا توجد طلبات</p></div>';return;}
  box.innerHTML=list.map(o=>{
    const t=new Date(o.createdAt).toLocaleString('ar-KW',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
    const stMap={new:['طلب جديد','st-new'],preparing:['قيد التحضير','st-preparing'],done:['مكتمل','st-done']};
    const st=stMap[o.status]||stMap.new;
    const meta=[o.name,o.phone,o.note].filter(Boolean).join(' • ');
    return `<div class="order ${o.status==='new'?'new':''}">
      <div class="top">
        <div><span class="oid">${o.id}</span> <span class="status-tag ${st[1]}">${st[0]}</span></div>
        <div style="text-align:left"><span class="chan ${o.channel}">${o.channel==='knet'?'KNET':(o.channel==='whatsapp'?'واتساب':o.channel)}</span><div class="time">${t}</div></div>
      </div>
      <div class="items">${o.items}</div>
      <div class="total">${Number(o.total).toFixed(3)} د.ك</div>
      ${meta?`<div class="meta">${meta}</div>`:''}
      <div class="actions">
        ${o.status!=='preparing'?`<button class="sbtn prep" onclick="upd('${o.id}','preparing')">👨‍🍳 قيد التحضير</button>`:''}
        ${o.status!=='done'?`<button class="sbtn done" onclick="upd('${o.id}','done')">✅ مكتمل</button>`:''}
      </div>
    </div>`;
  }).join('');
}
function upd(id,status){
  fetch('/api/orders',{method:'PATCH',headers:{'Content-Type':'application/json','x-admin-key':KEY},body:JSON.stringify({id,status})})
    .then(()=>{const o=orders.find(x=>x.id===id);if(o)o.status=status;render();});
}
(function(){try{const k=sessionStorage.getItem('ak');if(k){document.getElementById('pass').value=k;}}catch(_){}})();
</script>
</body>
</html>
